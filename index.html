<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0c1017">
  <title>VOLTAGE — Arena FPS</title>
  <meta name="description" content="A fast, polished browser FPS. One arena, one rifle, endless drones.">
  <link rel="icon" href="icons/icon-192.png" type="image/png">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="VOLTAGE">
  <link rel="stylesheet" href="css/style.css">
  <script type="importmap">
    { "imports": { "three": "./lib/three.module.min.js" } }
  </script>
</head>
<body>
  <div id="app">
    <canvas id="game-canvas"></canvas>

    <!-- ===== HUD ===== -->
    <div id="hud" class="hidden">
      <div id="crosshair">
        <span class="ch-line ch-t"></span><span class="ch-line ch-b"></span>
        <span class="ch-line ch-l"></span><span class="ch-line ch-r"></span>
        <span class="ch-dot"></span>
      </div>
      <div id="hitmarker">
        <span></span><span></span><span></span><span></span>
      </div>

      <div id="hud-bl">
        <div id="health-wrap">
          <div id="health-bar"><div id="health-fill"></div></div>
          <div id="health-num">100</div>
        </div>
      </div>

      <div id="hud-br">
        <div id="ammo-wrap">
          <span id="ammo-mag">30</span><span id="ammo-sep">/</span><span id="ammo-reserve">∞</span>
        </div>
        <div id="reload-hint" class="hidden">RELOAD [R]</div>
      </div>

      <div id="hud-tl">
        <div id="score-panel">
          <div id="score-num">0</div>
          <div id="score-row">
            <span id="wave-chip">WAVE 1</span>
            <span class="kills-label">KILLS</span><span id="kills-num">0</span>
          </div>
          <div id="combo-row" class="hidden">
            <span id="combo-chip">×2</span>
            <div id="combo-bar"><i id="combo-fill"></i></div>
          </div>
        </div>
      </div>

      <div id="wave-banner" class="hidden">
        <div id="wave-banner-title"></div>
        <div id="wave-banner-sub"></div>
      </div>

      <button id="btn-pause-hud" class="icon-btn" aria-label="Pause">❚❚</button>

      <div id="damage-vignette"></div>
      <div id="heal-vignette"></div>
      <div id="dmg-numbers"></div>
    </div>

    <!-- ===== Mobile controls ===== -->
    <div id="mobile-controls" class="hidden">
      <div id="joystick-zone">
        <div id="joystick-base" class="hidden"><div id="joystick-knob"></div></div>
      </div>
      <div id="look-zone"></div>
      <div id="mc-buttons">
        <button id="mc-aim" class="mc-btn" aria-label="Aim"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="7" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M12 2v4M12 18v4M2 12h4M18 12h4" stroke="currentColor" stroke-width="1.8"/></svg></button>
        <button id="mc-fire" class="mc-btn mc-fire" aria-label="Fire"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5" fill="currentColor"/><circle cx="12" cy="12" r="9.5" fill="none" stroke="currentColor" stroke-width="1.6"/></svg></button>
        <button id="mc-jump" class="mc-btn" aria-label="Jump"><svg viewBox="0 0 24 24"><path d="M12 4l6 7h-4v9h-4v-9H6z" fill="currentColor"/></svg></button>
        <button id="mc-reload" class="mc-btn" aria-label="Reload"><svg viewBox="0 0 24 24"><path d="M12 5a7 7 0 1 1-6.3 4H3.5L7 4.5 10.5 9H8a5 5 0 1 0 4-2z" fill="currentColor"/></svg></button>
        <button id="mc-sprint" class="mc-btn" aria-label="Sprint"><svg viewBox="0 0 24 24"><path d="M13 3.5a1.8 1.8 0 1 1 0 3.6 1.8 1.8 0 0 1 0-3.6zM9 22l2.3-6.4-2-1.6L8 18H5.5l1.8-5.6c.3-1 .8-1.6 1.8-2l3.2-1.3c1-.4 2-.1 2.6.7l1.2 1.6c.7 1 1.7 1.5 3.4 1.6v2c-2.2 0-3.7-.6-4.8-1.9l-.7 2.4 2 2V22h-2.3v-3.6l-2-1.7L11.5 22z" fill="currentColor"/></svg></button>
      </div>
    </div>

    <!-- ===== Menus ===== -->
    <div id="menu-start" class="menu">
      <div class="menu-panel">
        <h1 class="game-title">VOLT<span>AGE</span></h1>
        <p class="game-sub">ARENA COMBAT PROTOCOL</p>
        <div id="weapon-select"></div>
        <button id="btn-play" class="btn btn-primary">DEPLOY</button>
        <div class="controls-hint" id="hint-desktop">
          <div><b>WASD</b> Move</div><div><b>LMB</b> Fire</div><div><b>RMB</b> Aim</div>
          <div><b>SPACE</b> Jump</div><div><b>SHIFT</b> Sprint</div><div><b>R</b> Reload</div>
        </div>
        <div class="controls-hint" id="hint-mobile">
          <div><b>LEFT</b> Move</div><div><b>RIGHT</b> Aim</div><div><b>◉</b> Fire</div>
        </div>
        <p class="best-line hidden" id="best-line">BEST <b id="best-num">0</b> PTS · WAVE <b id="best-wave">1</b></p>
      </div>
    </div>

    <div id="menu-pause" class="menu hidden">
      <div class="menu-panel">
        <h2 class="menu-title">PAUSED</h2>
        <button id="btn-resume" class="btn btn-primary">RESUME</button>
        <button id="btn-restart" class="btn">RESTART</button>
        <div class="settings-block">
          <div class="setting-row">
            <label for="sens-slider">SENSITIVITY <span id="sens-val">1.0</span></label>
            <input type="range" id="sens-slider" min="40" max="220" step="5" value="100">
          </div>
          <button id="btn-gfx" class="btn">GRAPHICS: HIGH</button>
          <button id="btn-sound" class="btn">SOUND: ON</button>
        </div>
      </div>
    </div>

    <div id="menu-death" class="menu hidden">
      <div class="menu-panel">
        <h2 class="menu-title death-title">SYSTEMS FAILED</h2>
        <div class="death-stats">
          <div class="stat"><span id="death-score">0</span><label>SCORE</label></div>
          <div class="stat"><span id="death-wave">1</span><label>WAVE</label></div>
          <div class="stat"><span id="death-kills">0</span><label>KILLS</label></div>
          <div class="stat"><span id="death-best">0</span><label>BEST</label></div>
        </div>
        <button id="btn-respawn" class="btn btn-primary">REDEPLOY</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
